<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koko Candles Live Playback</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #05070d;
      --panel: rgba(15, 20, 32, 0.92);
      --panel2: rgba(8, 11, 19, 0.96);
      --text: #d8e1ff;
      --muted: #7f8ba8;
      --border: rgba(130, 150, 210, 0.18);
      --green: #00d084;
      --red: #ff4d6d;
      --blue: #4da3ff;
      --yellow: #ffc857;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(55, 115, 255, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 208, 132, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 72px 1fr 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      background: linear-gradient(180deg, rgba(15, 20, 32, 0.96), rgba(8, 11, 19, 0.84));
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .brand {
      display: flex;
      flex-direction: column;
      min-width: 240px;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 640px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      padding: 10px 15px;
      border-radius: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition:
        transform 120ms ease,
        background 120ms ease,
        border-color 120ms ease,
        opacity 120ms ease;
      user-select: none;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.075);
      border-color: rgba(130, 150, 210, 0.36);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: linear-gradient(135deg, rgba(0, 208, 132, 0.22), rgba(77, 163, 255, 0.18));
      border-color: rgba(0, 208, 132, 0.36);
    }

    button.danger {
      background: rgba(255, 77, 109, 0.10);
      border-color: rgba(255, 77, 109, 0.28);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(255, 200, 87, 0.7);
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 18px rgba(0, 208, 132, 0.85);
    }

    .dot.pause {
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(255, 200, 87, 0.75);
    }

    .dot.done {
      background: var(--blue);
      box-shadow: 0 0 18px rgba(77, 163, 255, 0.75);
    }

    .dot.error {
      background: var(--red);
      box-shadow: 0 0 18px rgba(255, 77, 109, 0.85);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: 0;
    }

    .chart-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      padding: 14px 0 0 14px;
    }

    #chart {
      width: 100%;
      height: 100%;
      border-top-left-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(3, 5, 10, 0.7);
    }

    .hud {
      position: absolute;
      left: 30px;
      top: 30px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      z-index: 4;
      max-width: calc(100% - 60px);
      pointer-events: none;
    }

    .hud-card {
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(5, 7, 13, 0.72);
      border: 1px solid rgba(130, 150, 210, 0.18);
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: var(--muted);
    }

    .hud-card strong {
      color: var(--text);
    }

    .side {
      min-height: 0;
      padding: 14px;
      border-left: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(15, 20, 32, 0.92), rgba(8, 11, 19, 0.96));
      overflow: auto;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.24);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      text-transform: uppercase;
      color: #f1f5ff;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(130, 150, 210, 0.10);
      font-size: 13px;
    }

    .metric:last-child {
      border-bottom: none;
    }

    .metric span:first-child {
      color: var(--muted);
    }

    .metric span:last-child {
      color: var(--text);
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .log {
      height: 220px;
      overflow: auto;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.20);
      border: 1px solid rgba(130, 150, 210, 0.10);
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        "Liberation Mono",
        monospace;
      font-size: 11px;
      color: #9fb0d7;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      background: rgba(8, 11, 19, 0.95);
    }

    .mono {
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        "Liberation Mono",
        monospace;
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 280px;
      }

      .side {
        border-left: none;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .panel {
        margin-bottom: 0;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">Koko Candles Live Playback</div>
        <div id="subtitle" class="brand-subtitle">
          Connects to local Python streamer.
        </div>
      </div>

      <div class="controls">
        <div class="pill">
          <span id="statusDot" class="dot pause"></span>
          <span id="statusText">Connecting...</span>
        </div>

        <button id="playBtn" class="primary">▶ Play</button>
        <button id="pauseBtn">⏸ Pause</button>
        <button id="resetBtn" class="danger">↺ Reset</button>
      </div>
    </header>

    <main class="main">
      <section class="chart-wrap">
        <div id="chart"></div>

        <div class="hud">
          <div class="hud-card">Bars: <strong id="hudBars">0</strong></div>
          <div class="hud-card">Ticks: <strong id="hudTicks">0</strong></div>
          <div class="hud-card">Last Close: <strong id="hudClose">—</strong></div>
          <div class="hud-card">Emit Time: <strong id="hudEmit">—</strong></div>
        </div>
      </section>

      <aside class="side">
        <div class="panel">
          <div class="panel-title">Session</div>

          <div class="metric">
            <span>Status</span>
            <span id="mStatus">—</span>
          </div>

          <div class="metric">
            <span>Range</span>
            <span id="mRange">—</span>
          </div>

          <div class="metric">
            <span>Reversal</span>
            <span id="mRev">—</span>
          </div>

          <div class="metric">
            <span>Clean Mode</span>
            <span id="mClean">—</span>
          </div>

          <div class="metric">
            <span>Speed</span>
            <span id="mSpeed">—</span>
          </div>

          <div class="metric">
            <span>File</span>
            <span id="mFile" class="mono">—</span>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Live Stats</
